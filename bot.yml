name: Real Madrid Bot 🤖

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  post-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 📥 Restore sent articles cache
        uses: actions/cache@v4
        with:
          path: sent_articles.json
          key: sent-articles-${{ github.run_id }}
          restore-keys: |
            sent-articles-

      - name: 🚀 Run Real Madrid Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
        run: |
          python src/bot.py

      - name: 💾 Commit sent articles state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_articles.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update sent articles [skip ci]"
          git push || true
